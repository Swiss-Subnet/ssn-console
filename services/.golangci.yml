version: '2'

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  exclusions:
    # goic-generated candid bindings (canister-clients) are committed but not
    # gofumpt-formatted, and golangci-lint fmt refuses to format generated
    # files. lax matches goic's "automatically generated by" header.
    generated: lax
    paths:
      - _gen\.go$

formatters:
  enable:
    - gofumpt
    - goimports
