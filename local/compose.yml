# Local dev stack: the Go services plus their dependencies -- telemetry sink
# (Alloy OTLP :4318 -> Prometheus :9090), Mailpit (SMTP :1025, UI :8025), and
# the auth-service / metrics-proxy containers. `just local-deps-up`.
#
# env_file pulls PRIVATE_KEY/SMTP/FRONTEND_URL from .env.local and the canister
# ids from the generated .env; `environment:` overrides the few values that
# must point at compose-internal DNS (mailpit, alloy) or the host replica.

services:
  prometheus:
    image: docker.io/prom/prometheus:v3.1.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
      - --enable-feature=out-of-order-time-window
    volumes:
      - ./prometheus.local.yml:/etc/prometheus/prometheus.yml:Z
    ports:
      - '9090:9090'

  alloy:
    image: docker.io/grafana/alloy:v1.5.1
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./alloy.local.alloy:/etc/alloy/config.alloy:Z
    ports:
      - '4318:4318'
      - '12345:12345'
    depends_on:
      - prometheus

  mailpit:
    image: docker.io/axllent/mailpit:latest
    ports:
      - '1025:1025'
      - '8025:8025'

  auth-service:
    build:
      context: ../services
      dockerfile: ../config/auth-service.containerfile
    env_file:
      - ../.env.local
    environment:
      SMTP_HOST: mailpit
      SMTP_PORT: '1025'
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
    ports:
      - '3000:3000'
    depends_on:
      - mailpit
      - alloy

  metrics-proxy:
    build:
      context: ../services
      dockerfile: ../config/metrics-proxy.containerfile
    env_file:
      - ../.env.local
      - ../.env
    environment:
      PORT: '3001'
      USE_FAKE_METRICS: 'true'
      # The replica runs on the host, not in this network.
      IC_HOST: http://host.containers.internal:4943
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
    ports:
      - '3001:3001'
    extra_hosts:
      - 'host.containers.internal:host-gateway'
    depends_on:
      - alloy
