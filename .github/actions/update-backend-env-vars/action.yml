name: Update backend env vars
description: Update backend env vars

inputs:
  network:
    description: The ICP network to update the canister env vars on
    required: true

  public_key:
    description: The public signing key of the auth service
    required: true

runs:
  using: 'composite'
  steps:
    - name: Update backend env vars
      shell: bash
      run: |
        CANISTER_ID=$(dfx canister id backend --network ${{ inputs.network }})
        CANISTER_HISTORY_ID=$(dfx canister id canister-history --network ${{ inputs.network }})
        FORMATTED_PUBLIC_KEY=$(echo "${{ inputs.public_key }}" | awk '{printf "%s\\n", $0}' | sed 's/\\n$//')
        # Single source of truth: the auth service URL lives in the frontend env.json,
        # keyed by network, so frontend and backend never drift.
        AUTH_SERVICE_URL=$(jq -er ".[\"${{ inputs.network }}\"].AUTH_SERVICE_URL" src/frontend/env.json)

        dfx canister call aaaaa-aa update_settings "(
          record {
            canister_id = principal \"$CANISTER_ID\";
            settings = record {
              environment_variables = opt vec {
                record {
                  name = \"PUBLIC_KEY\";
                  value = \"$FORMATTED_PUBLIC_KEY\";
                };
                record {
                  name = \"AUTH_SERVICE_URL\";
                  value = \"$AUTH_SERVICE_URL\";
                };
                record {
                  name = \"CANISTER_HISTORY_ID\";
                  value = \"$CANISTER_HISTORY_ID\";
                };
              };
            };
          }
        )" --network ${{ inputs.network }}
