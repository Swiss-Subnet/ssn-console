# Shared path filters for build-and-test.yml and lint.yml (union of both).
rust:
  - '**/*.rs'
  - 'Cargo.toml'
  - 'Cargo.lock'
  - 'rust-toolchain.toml'
  - 'rustfmt.toml'
  - 'dfx.json'
  - '.github/actions/setup-dfx/**'
  - '.github/filters.yml'
  - '.github/workflows/build-and-test.yml'
  - '.github/workflows/lint.yml'

# `frontend` (build-and-test) and `typescript` (lint) are the same surface.
frontend: &frontend
  - 'src/frontend/**'
  - '**/*.ts'
  - '**/*.tsx'
  - '**/*.js'
  - '**/*.jsx'
  - '**/*.json'
  - '**/*.md'
  - 'package.json'
  - 'bun.lock'
  - 'tsconfig.json'
  - 'turbo.json'
  - 'prettier.config.cjs'
  - '.github/actions/setup-bun/**'
  - '.github/filters.yml'
  - '.github/workflows/build-and-test.yml'
  - '.github/workflows/lint.yml'

typescript: *frontend

go:
  - 'services/**/*.go'
  - 'services/**/go.mod'
  - 'services/**/go.sum'
  - 'services/go.work'
  - 'services/go.work.sum'
  - 'services/.golangci.yml'
  - 'services/Justfile'
  - 'config/auth-service.containerfile'
  # canister-clients' committed bindings are generated from these .did files;
  # a change here must run lint_go's drift check.
  - 'src/backend-api/**/*.did'
  - 'src/cycles-monitor-api/**/*.did'
  - 'src/canister-history-api/**/*.did'
  - 'src/canister-utils/**/*.did'
  - '.github/filters.yml'
  - '.github/workflows/build-and-test.yml'
  - '.github/workflows/lint.yml'

go-tools:
  - 'tools/**/*.go'
  - 'tools/**/go.mod'
  - 'tools/**/go.sum'
  - 'tools/go.work'
  - 'tools/go.work.sum'
  - 'tools/.golangci.yml'
  # ssn-admin consumes the shared canister-clients module; its bindings are
  # generated under services/, so .did changes are covered by the `go` filter.
  - '.github/filters.yml'
  - '.github/workflows/build-and-test.yml'
  - '.github/workflows/lint.yml'
