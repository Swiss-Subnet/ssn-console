name: Lint

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      typescript: ${{ steps.filter.outputs.typescript }}
      go: ${{ steps.filter.outputs.go }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            rust:
              - '**/*.rs'
              - 'rustfmt.toml'
              - 'rust-toolchain.toml'
              - 'Cargo.toml'
              - 'Cargo.lock'
            typescript:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.json'
              - '**/*.md'
              - 'prettier.config.cjs'
              - 'package.json'
              - 'bun.lock'
            go:
              - 'services/**/*.go'
              - 'services/**/go.mod'
              - 'services/**/go.sum'
              - 'services/go.work'
              - 'services/go.work.sum'
              - 'services/.golangci.yml'
              - 'services/Justfile'
              - '.github/workflows/lint.yml'

  lint_rust:
    name: Lint Rust
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Cargo fmt
        run: cargo fmt -- --check

  lint_typescript:
    name: Lint TypeScript
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Check TypeScript formatting
        run: bun format:check

  lint_go:
    name: Lint Go
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: services/go.work
          cache-dependency-path: services/**/go.sum

      # Install only; we invoke golangci-lint ourselves below so the same
      # binary runs against every service module.
      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
          install-only: true

      - name: Format check
        run: golangci-lint fmt --diff

      - name: go vet + golangci-lint per service
        run: |
          set -euo pipefail
          for svc in */; do
            [ -f "${svc}go.mod" ] || continue
            echo "::group::$svc"
            (cd "$svc" && go vet ./... && golangci-lint run ./...)
            echo "::endgroup::"
          done
