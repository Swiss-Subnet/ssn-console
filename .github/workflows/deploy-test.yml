name: Deploy Test

on:
  push:
    branches:
      - main

concurrency:
  group: test
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: test
      url: https://r5rta-kyaaa-aaaax-qaaca-cai.icp0.io
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup DFX
        uses: ./.github/actions/setup-dfx

      - name: Import DFX identity
        run: |
          echo "${{ secrets.IDENTITY_PEM }}" > ./test.pem
          dfx identity import --ic --storage-mode plaintext test ./test.pem
          rm -f ./test.pem
          dfx identity use test

      - name: Update Canister Environment Variables
        env:
          PUBLIC_KEY: ${{ secrets.PUBLIC_KEY }}
        run: |
          BACKEND_ID=$(dfx canister id backend --network test)
          FORMATTED_KEY=$(echo "$PUBLIC_KEY" | awk '{printf "%s\\n", $0}' | sed 's/\\n$//')
          dfx canister call aaaaa-aa update_settings "(
            record {
              canister_id = principal \"$BACKEND_ID\";
              settings = record {
                environment_variables = opt vec {
                  record {
                    name = \"PUBLIC_KEY\";
                    value = \"$FORMATTED_KEY\";
                  };
                };
              };
            }
          )" --network test

      - name: Deploy to test
        run: |
          export DFX_WARNING=-mainnet_plaintext_identity
          dfx deploy --network test
