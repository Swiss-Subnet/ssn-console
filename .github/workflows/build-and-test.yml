name: Build and Test

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      frontend: ${{ steps.filter.outputs.frontend }}
      go: ${{ steps.filter.outputs.go }}
      go-tools: ${{ steps.filter.outputs.go-tools }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: .github/filters.yml

  build_and_test_all_canisters:
    name: Build and Test All Canisters
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup DFX
        uses: ./.github/actions/setup-dfx

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ssn-console

      - name: DFX build
        run: dfx build --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features

      - name: Cargo test
        # backend-e2e needs a built wasm + PocketIC; it runs in its own job.
        run: cargo test --workspace --exclude backend-e2e

  build_and_test_backend:
    name: Build and Test Backend
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup DFX
        uses: ./.github/actions/setup-dfx

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ssn-console

      - name: DFX build
        run: dfx build backend --check

      - name: pic-js tests
        run: bun turbo -F backend-tests test

  build_and_test_backend_e2e:
    name: Build and Test Backend (e2e)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ssn-console

      - name: Install PocketIC server
        uses: dfinity/pocketic@a980c334fab1b21b0b8a6bba38e1a10836e7258b # main @ 2026-06-26
        with:
          pocket-ic-server-version: '14.0.0'

      - name: Build backend wasm (no frontend)
        run: cargo build --target wasm32-unknown-unknown --release -p backend --locked --no-default-features

      - name: Cargo test backend-e2e
        env:
          BACKEND_WASM: target/wasm32-unknown-unknown/release/backend.wasm
        run: cargo test -p backend-e2e

  build_and_test_canister_history:
    name: Build and Test Canister History
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup DFX
        uses: ./.github/actions/setup-dfx

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ssn-console

      - name: DFX build
        run: dfx build canister-history --check

      - name: pic-js tests
        run: bun turbo -F canister-history-tests test

  build_and_test_cycles_monitor:
    name: Build and Test Cycles Monitor
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup DFX
        uses: ./.github/actions/setup-dfx

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ssn-console

      - name: DFX build
        run: dfx build cycles-monitor --check

      # Temporary™️ workaround until pocket ic supports the `canister_metrics` endpoint
      - name: Build with mock-metrics for tests
        run: |
          cargo build --target wasm32-unknown-unknown --release -p cycles-monitor --locked --features mock-metrics
          gzip -c target/wasm32-unknown-unknown/release/cycles_monitor.wasm > .dfx/local/canisters/cycles-monitor/cycles-monitor.wasm.gz

      - name: pic-js tests
        run: bun turbo -F cycles-monitor-tests test

  type_check_typescript:
    name: Type Check TypeScript
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Build
        run: bun turbo build

      - name: Type check
        run: bun type-check

  build_and_test_services:
    name: Build and Test Go Services
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: services/go.work
          cache-dependency-path: services/**/go.sum

      - name: Build and test per service
        run: |
          set -euo pipefail
          for svc in */; do
            [ -f "${svc}go.mod" ] || continue
            echo "::group::$svc"
            (cd "$svc" && go build ./... && go test ./...)
            echo "::endgroup::"
          done

  build_and_test_tools:
    name: Build and Test Go Tools
    needs: changes
    if: needs.changes.outputs.go-tools == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tools/go.work
          cache-dependency-path: tools/**/go.sum

      - name: Build and test per tool
        run: |
          set -euo pipefail
          for t in */; do
            [ -f "${t}go.mod" ] || continue
            echo "::group::$t"
            (cd "$t" && go build ./... && go test ./...)
            echo "::endgroup::"
          done
