name: Build and Test

on:
  pull_request:

concurrency:
  group: pr-${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  build_and_test_all:
    name: Build and Test All
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup DFX
        uses: ./.github/actions/setup-dfx

      - name: DFX build
        run: dfx build --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features

      - name: Cargo test
        run: cargo test

  build_and_test_backend:
    name: Build and Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup DFX
        uses: ./.github/actions/setup-dfx

      - name: DFX build
        run: dfx build backend --check

      - name: pic-js tests
        run: bun run -F backend-tests test

  build_and_test_canister_history:
    name: Build and Test Canister History
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup DFX
        uses: ./.github/actions/setup-dfx

      - name: DFX build
        run: dfx build canister-history --check

      - name: pic-js tests
        run: bun run -F canister-history-tests test
