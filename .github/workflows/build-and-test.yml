name: Build and Test

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      frontend: ${{ steps.filter.outputs.frontend }}
      offchain: ${{ steps.filter.outputs.offchain }}
      otlp_syncer: ${{ steps.filter.outputs.otlp_syncer }}
      go: ${{ steps.filter.outputs.go }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            rust:
              - '**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'dfx.json'
              - '.github/workflows/build-and-test.yml'
              - '.github/actions/setup-dfx/**'
            frontend:
              - 'src/frontend/**'
              - '**/*.ts'
              - '**/*.tsx'
              - 'package.json'
              - 'bun.lock'
              - 'tsconfig.json'
              - 'turbo.json'
              - 'prettier.config.cjs'
              - '.github/actions/setup-bun/**'
            offchain:
              - 'src/offchain-service/**'
              - 'config/offchain-service.containerfile'
            otlp_syncer:
              - 'src/canister-otlp-syncer/**'
              - 'config/canister-otlp-syncer.containerfile'
            go:
              - 'services/**/*.go'
              - 'services/**/go.mod'
              - 'services/**/go.sum'
              - 'services/go.work'
              - 'services/go.work.sum'
              - 'services/Justfile'
              - '.github/workflows/build-and-test.yml'

  build_and_test_all_canisters:
    name: Build and Test All Canisters
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup DFX
        uses: ./.github/actions/setup-dfx

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ssn-console

      - name: DFX build
        run: dfx build --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features

      - name: Cargo test
        run: cargo test

  build_and_test_backend:
    name: Build and Test Backend
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup DFX
        uses: ./.github/actions/setup-dfx

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ssn-console

      - name: DFX build
        run: dfx build backend --check

      - name: pic-js tests
        run: bun turbo -F backend-tests test

  build_and_test_canister_history:
    name: Build and Test Canister History
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup DFX
        uses: ./.github/actions/setup-dfx

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ssn-console

      - name: DFX build
        run: dfx build canister-history --check

      - name: pic-js tests
        run: bun turbo -F canister-history-tests test

  build_and_test_cycles_monitor:
    name: Build and Test Cycles Monitor
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup DFX
        uses: ./.github/actions/setup-dfx

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ssn-console

      - name: DFX build
        run: dfx build cycles-monitor --check

      # Temporary™️ workaround until pocket ic supports the `canister_metrics` endpoint
      - name: Build with mock-metrics for tests
        run: |
          cargo build --target wasm32-unknown-unknown --release -p cycles-monitor --locked --features mock-metrics
          gzip -c target/wasm32-unknown-unknown/release/cycles_monitor.wasm > .dfx/local/canisters/cycles-monitor/cycles-monitor.wasm.gz

      - name: pic-js tests
        run: bun turbo -F cycles-monitor-tests test

  type_check_typescript:
    name: Type Check TypeScript
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Build
        run: bun turbo build

      - name: Type check
        run: bun type-check

  build_offchain_service:
    name: Build Offchain Service
    needs: changes
    if: needs.changes.outputs.offchain == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Build Container image
        run: docker build -f ./config/offchain-service.containerfile -t offchain-service .

  test_offchain_service:
    name: Test Offchain Service
    needs: changes
    if: needs.changes.outputs.offchain == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Unit tests
        run: bun turbo -F offchain-service test

  build_canister_otlp_syncer:
    name: Build Canister OTLP Syncer
    needs: changes
    if: needs.changes.outputs.otlp_syncer == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Build Container image
        run: docker build -f ./config/canister-otlp-syncer.containerfile -t canister-otlp-syncer .

  build_and_test_services:
    name: Build and Test Go Services
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: services/go.work
          cache-dependency-path: services/**/go.sum

      - name: Build and test per service
        run: |
          set -euo pipefail
          for svc in */; do
            [ -f "${svc}go.mod" ] || continue
            echo "::group::$svc"
            (cd "$svc" && go build ./... && go test ./...)
            echo "::endgroup::"
          done
