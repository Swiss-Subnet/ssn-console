name: Deploy Production

on: workflow_dispatch

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://console.subnet.ch
    env:
      DFX_WARNING: -mainnet_plaintext_identity
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup DFX
        uses: ./.github/actions/setup-dfx

      - name: Import DFX Identity
        uses: ./.github/actions/import-dfx-identity
        with:
          identity_pem: ${{ secrets.IDENTITY_PEM }}

      - name: Update backend env vars
        uses: ./.github/actions/update-backend-env-vars
        with:
          network: production
          public_key: ${{ secrets.PUBLIC_KEY }}
          offchain_service_url: ${{ secrets.OFFCHAIN_SERVICE_URL }}

      - name: Deploy to production
        run: dfx deploy --network production
