name: Run canister benchmarks

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

env:
  RUST_VERSION: 1.92.0 # Use the same version as in `rust-toolchain.toml`
  CARGO_TERM_COLOR: always # Force Cargo to use colors
  TERM: xterm-256color

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      benchmarks: ${{ steps.filter.outputs.benchmarks }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            benchmarks:
              - '**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'benchmarks/**'
              - 'scripts/ci-run-benchmark.sh'
              - 'scripts/ci-post-run-benchmark.sh'
              - '.github/workflows/run-benchmarks.yml'

  benchmark:
    needs: changes
    if: needs.changes.outputs.benchmarks == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        name:
          - backend
          - canister-history
          - cycles-monitor
        include:
          - name: backend
            project_dir: ./benchmarks/backend
          - name: canister-history
            project_dir: ./benchmarks/canister-history
          - name: cycles-monitor
            project_dir: ./benchmarks/cycles-monitor

    env:
      PROJECT_DIR: ${{ matrix.project_dir }}

    steps:
      - name: Checkout current PR
        uses: actions/checkout@v6.0.2

      - name: Checkout baseline branch
        uses: actions/checkout@v6.0.2
        with:
          ref: main
          path: _canbench_baseline_branch

      - name: Install Rust
        run: |
          rustup update "${RUST_VERSION}" --no-self-update
          rustup default "${RUST_VERSION}"
          rustup target add wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: benchmarks-${{ matrix.name }}

      - name: Benchmark
        run: |
          bash ./scripts/ci-run-benchmark.sh "$PROJECT_DIR" "${{ matrix.name }}"

      - uses: actions/upload-artifact@v7
        with:
          name: canbench_result_${{ matrix.name }}
          path: /tmp/canbench_result_${{ matrix.name }}

      - uses: actions/upload-artifact@v7
        with:
          name: canbench_results_persisted_${{ matrix.name }}_yml
          path: /tmp/canbench_results_persisted_${{ matrix.name }}.yml

      - uses: actions/upload-artifact@v7
        with:
          name: canbench_results_${{ matrix.name }}_csv
          path: /tmp/canbench_results_${{ matrix.name }}.csv

      - name: Pass or fail
        run: |
          bash ./scripts/ci-post-run-benchmark.sh

  upload-pr-number:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Save PR number
        run: |
          echo ${{ github.event.number }} > /tmp/pr_number

      - uses: actions/upload-artifact@v7
        with:
          name: pr_number
          path: /tmp/pr_number
